<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Советы Minecraft</title>
    <link rel="icon" type="image/png" href="img/Icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 18px;
            font-size: 3em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .top-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .top-action-button {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffff 100%);
            color: #1a1a1a;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .top-action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.25);
        }

        .page-description {
            text-align: center;
            color: #aaa;
            font-size: 1em;
            margin-bottom: 30px;
        }

        .advice-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .advice-card {
            width: 100%;
            max-width: 900px;
            text-align: left;
            background: linear-gradient(135deg, #121212 0%, #1e1e1e 100%);
            border: 2px solid #00d4ff;
            border-radius: 14px;
            padding: 22px 24px;
            color: #e0e0e0;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            min-height: 90px;
            display: flex;
            align-items: center;
        }

        .advice-card:hover {
            transform: translateY(-3px);
            border-color: #00ffff;
            box-shadow: 0 14px 28px rgba(0, 212, 255, 0.18);
        }

        .advice-card-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .advice-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #00d4ff;
        }

        .advice-summary {
            font-size: 0.95em;
            color: #aaa;
            line-height: 1.4;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #242424;
            padding: 36px;
            border-radius: 12px;
            border: 2px solid #00d4ff;
            text-align: left;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.3s ease;
            position: relative;
        }

        @keyframes slideIn {
            from { transform: translateY(-40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content h2 {
            color: #00d4ff;
            font-size: 1.8em;
            margin-bottom: 18px;
            text-shadow: 0 0 5px rgba(0, 212, 255, 0.2);
        }

        .modal-content p {
            color: #ccc;
            margin-bottom: 16px;
            font-size: 1em;
            line-height: 1.6;
        }

        .modal-content a {
            color: #00ffff;
            text-decoration: underline;
        }

        .modal-content a:hover {
            color: #ffffff;
        }

        .modal-close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #00d4ff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            color: #00ffff;
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .advice-card {
                padding: 18px 16px;
                min-height: 80px;
            }

            .modal-content {
                padding: 28px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💡 Советы по настройке</h1>
        <div class="top-actions">
            <a class="top-action-button" href="index.html">← На главную</a>
        </div>
        <p class="page-description">Здесь собраны полезные рекомендации для настройки модов. Нажмите на карточку, чтобы посмотреть подробности.</p>

        <div class="advice-list">
            <button type="button" class="advice-card" onclick="openAdviceModal('ipn')">
                <div class="advice-card-content">
                    <div class="advice-title">Советы по IPN (Inventory Profiles Next)</div>
                    <div class="advice-summary">Рекомендуем настроить автозамену инструментов и автозаполнение под себя.</div>
                </div>
            </button>
            <button type="button" class="advice-card" onclick="openAdviceModal('freshAmination')">
                <div class="advice-card-content">
                    <div class="advice-title">Советы по FRESH AMINATION</div>
                    <div class="advice-summary">Что делать, если ресурспаки этой серии не работают.</div>
                </div>
            </button>
            <button type="button" class="advice-card" onclick="openAdviceModal('nbtexplorer')">
                <div class="advice-card-content">
                    <div class="advice-title">Изменение GameRule и другие данные (NBTExplorer)</div>
                    <div class="advice-summary">Редактирование GameRule и других данных мира без включения читов с помощью NBTExplorer.</div>
                </div>
            </button>
        </div>
    </div>

    <div id="adviceModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeAdviceModal()">&times;</span>
            <h2 id="adviceModalTitle"></h2>
            <div id="adviceModalBody"></div>
        </div>
    </div>

    <script>
        const adviceModal = document.getElementById('adviceModal');
        const adviceModalTitle = document.getElementById('adviceModalTitle');
        const adviceModalBody = document.getElementById('adviceModalBody');

        const adviceData = {
            ipn: {
                title: 'Советы по IPN (Inventory Profiles Next)',
                content: [
                    'В IPN рекомендуем настроить всё под себя. Самое главное — это автозамена инструментов или её полное отключение, если она мешает вашему игровому процессу.',
                    'Откройте в меню Minecraft вкладку «Моды», найдите IPN и нажмите на него. Затем выберите раздел «Автозаполнение».',
                    'В разделе «Автозаполнение» установите параметр «Предел прочности» в 0. После этого опуститесь ниже и установите «Число оповещений до замены» в 1.'
                ]
            },
            freshAmination: {
                title: 'Советы по FRESH AMINATION',
                content: [
                    'Ресурспаки FRESH AMINATION работают только с OptiFine. Если вы хотите использовать их на другом движке шейдеров, нужно установить <a href="https://modrinth.com/mod/entity-model-features" target="_blank" rel="noopener noreferrer">EMF</a> и <a href="https://modrinth.com/mod/entitytexturefeatures" target="_blank" rel="noopener noreferrer">ETF</a>.',
                    'Если вы используете другой шейдерный движок, то обязательно установите оба дополнения: EMF и ETF.',
                    'EMF поможет поддерживать модельные возможности, а ETF — текстурные функции.'
                ]
            }
            ,
            nbtexplorer: {
                title: 'Изменение GameRule и другие данные без включения читов',
                content: [
                    'Изменять GameRule и другие данные сохранения можно с помощью программы <a href="https://github.com/jaquadro/NBTExplorer/releases/tag/v2.8.0-win" target="_blank" rel="noopener noreferrer">NBTExplorer</a>.',
                    'Чтобы изменить GameRule: откройте папку сохранения, затем откройте файл "level.dat", перейдите в раздел "Data", затем в "Gamerules" и отредактируйте нужные параметры.'
                ]
            }
        };

        function openAdviceModal(key) {
            const advice = adviceData[key];
            if (!advice) return;
            adviceModalTitle.textContent = advice.title;
            adviceModalBody.innerHTML = advice.content.map(text => `<p>${text}</p>`).join('');
            adviceModal.classList.add('active');
        }

        function closeAdviceModal() {
            adviceModal.classList.remove('active');
        }

        adviceModal.addEventListener('click', function(event) {
            if (event.target === adviceModal) {
                closeAdviceModal();
            }
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeAdviceModal();
            }
        });
    </script>
</body>
</html>
